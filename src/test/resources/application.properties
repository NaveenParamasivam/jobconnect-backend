# ── Test profile — uses H2 in-memory, no real external services ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy JWT values for tests
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmctb25seS0yNTZiaXRz
app.jwt.expiration-ms=3600000

# Dummy Twilio — SMS service is mocked in tests
twilio.account-sid=TEST_SID
twilio.auth-token=TEST_TOKEN
twilio.phone-number=+10000000000

app.cors.allowed-origins=http://localhost:3000
